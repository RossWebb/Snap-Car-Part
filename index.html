<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PartSnap" />
  <meta name="description" content="Photograph and catalog spare parts instantly." />
  <title>PartSnap</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="manifest" href="./manifest.json" />

  <!-- ── Install prompt must be caught EARLY, before module scripts parse ── -->
  <script>
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      window.deferredPrompt = e;
      const btn = document.getElementById('install-btn');
      if (btn) btn.classList.remove('hidden');
    });
    window.addEventListener('appinstalled', () => {
      window.deferredPrompt = null;
      const btn = document.getElementById('install-btn');
      if (btn) btn.classList.add('hidden');
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0f;
      --surface:   #17171c;
      --surface2:  #1f1f27;
      --border:    #2a2a35;
      --accent:    #f0c040;
      --accent2:   #ff6b35;
      --text:      #e8e8ee;
      --muted:     #6b6b7e;
      --success:   #3ddc84;
      --danger:    #ff4d4d;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body, #app {
      background: #0d0d0f !important;
      min-height: 100dvh;
      width: 100%;
    }
    html, body {
      height: 100%;
      color: var(--text);
      font-family: var(--font-head);
      overflow: hidden;
    }
    #app {
      display: flex; flex-direction: column;
      height: 100dvh;
      position: relative; overflow: hidden;
    }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10; flex-shrink: 0;
    }
    .logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      display: flex; align-items: center; gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); display: inline-block;
      box-shadow: 0 0 10px var(--accent);
    }
    #install-btn {
      background: var(--accent); border: none;
      color: #0d0d0f; font-family: var(--font-mono);
      font-size: 12px; font-weight: 700;
      padding: 8px 14px; border-radius: 6px; cursor: pointer;
      letter-spacing: .5px; display: flex; align-items: center; gap: 6px;
      transition: opacity .2s;
    }
    #install-btn:hover { opacity: .85; }
    #install-btn.hidden { display: none; }

    /* ── SCREENS ── */
    .screen {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; position: relative;
    }
    .screen.hidden { display: none !important; }

    /* ── CAMERA SCREEN ── */
    #camera-screen { background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }

    .camera-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 24px 24px 40px;
      pointer-events: none;
    }
    .viewfinder {
      position: absolute; inset: 20%;
      border: 2px solid rgba(240,192,64,.45);
      border-radius: 6px;
    }
    .viewfinder::before, .viewfinder::after,
    .viewfinder span::before, .viewfinder span::after {
      content: ''; position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent); border-style: solid;
    }
    .viewfinder::before  { top: -2px; left: -2px;  border-width: 3px 0 0 3px; }
    .viewfinder::after   { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
    .viewfinder span::before { bottom: -2px; left: -2px;  border-width: 0 0 3px 3px; }
    .viewfinder span::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

    .cam-hint {
      text-align: center; font-family: var(--font-mono);
      font-size: 11px; color: rgba(255,255,255,.6);
      letter-spacing: 1px; text-transform: uppercase;
    }
    .cam-controls {
      display: flex; justify-content: center; align-items: center; gap: 32px;
      pointer-events: all;
    }
    #shutter-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: #fff; border: 4px solid rgba(255,255,255,.3);
      cursor: pointer;
      box-shadow: 0 0 0 6px rgba(255,255,255,.12);
      transition: transform .12s, box-shadow .12s;
    }
    #shutter-btn:active { transform: scale(.93); box-shadow: 0 0 0 3px rgba(255,255,255,.1); }

    #flip-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.12); border: none;
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(8px); transition: transform .3s;
    }
    #flip-btn:active { transform: rotate(180deg); }

    .flash-overlay {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none;
    }
    .flash-overlay.flash { animation: flash .35s ease-out forwards; }
    @keyframes flash { 0%{opacity:1} 100%{opacity:0} }

    canvas { display: none; }

    @keyframes scan { 0%{top:10%} 100%{top:90%} }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      top: 50%; animation: scan 2.4s ease-in-out infinite alternate;
      opacity: .6;
    }

    /* ── NO CAMERA ── */
    .no-cam {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; padding: 36px; text-align: center;
      background: var(--bg);
    }
    .no-cam.hidden { display: none; }
    .no-cam-icon { font-size: 52px; }
    .no-cam h2 { font-size: 20px; font-weight: 800; }
    .no-cam p  { font-size: 14px; color: var(--muted); line-height: 1.65; max-width: 300px; }
    .no-cam-btn {
      width: 100%; max-width: 280px;
      padding: 14px 20px; border-radius: 8px;
      font-family: var(--font-head); font-size: 14px; font-weight: 700;
      cursor: pointer; border: none; transition: opacity .2s;
    }
    .no-cam-btn:hover { opacity: .85; }
    .no-cam-btn.primary { background: var(--accent); color: #0d0d0f; }
    .no-cam-btn.secondary {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text);
    }
    .no-cam-btn.hidden { display: none; }

    /* ── ID ENTRY SCREEN ── */
    #id-screen { background: var(--bg); }
    .id-inner {
      flex: 1; display: flex; flex-direction: column;
      padding: 20px 20px 32px; gap: 16px; overflow-y: auto;
    }

    /* Photo preview */
    .preview-wrap {
      position: relative; border-radius: 12px; overflow: hidden;
      flex-shrink: 0; max-height: 260px;
      border: 1px solid var(--border);
      background: #111;
    }
    .preview-wrap.transparent-bg {
      background-image:
        linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
        linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-color: #1a1a1a;
    }
    #preview-img {
      width: 100%; max-height: 260px; object-fit: contain; display: block;
    }
    .preview-badge {
      position: absolute; top: 10px; left: 10px;
      background: rgba(13,13,15,.8); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 8px;
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      letter-spacing: .5px; backdrop-filter: blur(6px);
    }
    .retake-btn {
      position: absolute; top: 10px; right: 10px;
      background: rgba(13,13,15,.8); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; cursor: pointer;
      font-family: var(--font-head); font-size: 12px; font-weight: 600;
      color: var(--text); display: flex; align-items: center; gap: 5px;
      transition: border-color .2s; backdrop-filter: blur(6px);
    }
    .retake-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* BG removal row */
    .bg-row {
      display: flex; gap: 10px; align-items: stretch;
    }
    #bg-remove-btn {
      flex: 1; padding: 13px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font-head); font-size: 13px; font-weight: 700;
      cursor: pointer; transition: border-color .2s, background .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    #bg-remove-btn:hover:not(:disabled) { border-color: var(--accent); }
    #bg-remove-btn:disabled { opacity: .45; cursor: not-allowed; }
    #bg-remove-btn.done {
      border-color: var(--success); color: var(--success);
      background: rgba(61,220,132,.07);
    }
    #undo-btn {
      padding: 13px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted);
      font-family: var(--font-head); font-size: 13px;
      cursor: pointer; transition: border-color .2s, color .2s;
      display: none;
    }
    #undo-btn.visible { display: block; }
    #undo-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* Progress bar */
    .bg-progress { display: none; flex-direction: column; gap: 6px; }
    .bg-progress.visible { display: flex; }
    .bg-progress-label {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: .8px; text-transform: uppercase;
    }
    .bg-progress-track {
      height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
    }
    .bg-progress-fill {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 2px; transition: width .25s ease;
    }

    /* Part ID field */
    .field-label {
      font-size: 11px; font-family: var(--font-mono); letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    #part-id-input {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 18px; font-family: var(--font-mono); font-size: 18px;
      font-weight: 500; color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s; letter-spacing: 1px;
    }
    #part-id-input::placeholder { color: var(--muted); }
    #part-id-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(240,192,64,.15);
    }
    .input-hint {
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
      margin-top: 6px;
    }
    #filename-preview { color: var(--accent); }

    /* Save button */
    .save-btn {
      width: 100%; padding: 18px; border: none; border-radius: 10px;
      background: var(--accent); color: #0d0d0f;
      font-family: var(--font-head); font-size: 16px; font-weight: 800;
      letter-spacing: .5px; cursor: pointer;
      transition: opacity .2s, transform .12s;
      margin-top: auto;
    }
    .save-btn:hover  { opacity: .9; }
    .save-btn:active { transform: scale(.98); }
    .save-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Toast */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--success);
      border-radius: 10px; padding: 12px 20px;
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-mono); font-size: 13px; color: var(--success);
      opacity: 0; transition: all .3s; pointer-events: none;
      z-index: 100; white-space: nowrap;
    }
    #toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span class="logo-dot"></span>PartSnap</div>
    <button id="install-btn" class="hidden">Install PartSnap ⬇</button>
  </header>

  <!-- CAMERA SCREEN -->
  <div class="screen" id="camera-screen">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="flash-overlay" id="flash"></div>
    <div class="camera-overlay">
      <div class="viewfinder"><span></span><div class="scan-line"></div></div>
      <p class="cam-hint">Position part within frame</p>
      <div class="cam-controls">
        <button id="flip-btn" title="Flip camera">⟳</button>
        <button id="shutter-btn" title="Take photo"></button>
        <div style="width:44px"></div>
      </div>
    </div>

    <!-- No-camera overlay — shown instead of camera controls when access fails -->
    <div class="no-cam hidden" id="no-cam">
      <div class="no-cam-icon">📷</div>
      <h2>Camera Access Needed</h2>
      <p id="no-cam-msg">PartSnap needs camera access to photograph spare parts. Tap below to try again.</p>
      <button class="no-cam-btn primary" id="retry-cam-btn">Try Again</button>
      <button class="no-cam-btn secondary hidden" id="open-settings-btn">Open App Settings ↗</button>
    </div>
  </div>

  <!-- ID ENTRY SCREEN -->
  <div class="screen hidden" id="id-screen">
    <div class="id-inner">

      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img" src="" alt="Part photo" />
        <span class="preview-badge" id="preview-badge">CAPTURED</span>
        <button class="retake-btn" id="retake-btn">↩ Retake</button>
      </div>

      <div class="bg-row">
        <button id="bg-remove-btn">✂ Remove Background</button>
        <button id="undo-btn">↩ Undo</button>
      </div>
      <div class="bg-progress" id="bg-progress">
        <span class="bg-progress-label" id="bg-progress-label">Loading model…</span>
        <div class="bg-progress-track">
          <div class="bg-progress-fill" id="bg-progress-fill"></div>
        </div>
      </div>

      <div>
        <p class="field-label">Part ID / SKU</p>
        <input id="part-id-input" type="text" placeholder="e.g. HYD-4450-A"
               autocomplete="off" spellcheck="false" autocorrect="off" />
        <p class="input-hint">Filename: <span id="filename-preview">—</span></p>
      </div>

      <button class="save-btn" id="save-btn" disabled>Save Part Photo</button>
    </div>
  </div>
</div>

<div id="toast"><span id="toast-msg"></span></div>

<script type="module">
  import { removeBackground } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/+esm';

  // ── State ─────────────────────────────────────────────────
  let stream       = null;
  let facingMode   = 'environment';
  let originalBlob = null;
  let currentBlob  = null;
  let bgRemoved    = false;

  // ── DOM refs ──────────────────────────────────────────────
  const video           = document.getElementById('video');
  const canvas          = document.getElementById('canvas');
  const flash           = document.getElementById('flash');
  const shutterBtn      = document.getElementById('shutter-btn');
  const flipBtn         = document.getElementById('flip-btn');
  const camScreen       = document.getElementById('camera-screen');
  const idScreen        = document.getElementById('id-screen');
  const previewWrap     = document.getElementById('preview-wrap');
  const previewImg      = document.getElementById('preview-img');
  const previewBadge    = document.getElementById('preview-badge');
  const retakeBtn       = document.getElementById('retake-btn');
  const partIdInput     = document.getElementById('part-id-input');
  const filenamePreview = document.getElementById('filename-preview');
  const saveBtn         = document.getElementById('save-btn');
  const installBtn      = document.getElementById('install-btn');
  const noCam           = document.getElementById('no-cam');
  const noCamMsg        = document.getElementById('no-cam-msg');
  const retryCamBtn     = document.getElementById('retry-cam-btn');
  const openSettingsBtn = document.getElementById('open-settings-btn');
  const bgRemoveBtn     = document.getElementById('bg-remove-btn');
  const undoBtn         = document.getElementById('undo-btn');
  const bgProgress      = document.getElementById('bg-progress');
  const bgProgressLabel = document.getElementById('bg-progress-label');
  const bgProgressFill  = document.getElementById('bg-progress-fill');
  const toast           = document.getElementById('toast');
  const toastMsg        = document.getElementById('toast-msg');

  // ── Camera ────────────────────────────────────────────────
  async function startCamera() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      noCam.classList.add('hidden');
    } catch (err) {
      console.error('Camera error:', err);
      video.style.display = 'none';
      noCam.classList.remove('hidden');

      const isDenied = err.name === 'NotAllowedError';
      if (isDenied) {
        noCamMsg.textContent = 'Camera permission was denied. Please enable it in your device settings, then relaunch the app.';
        openSettingsBtn.classList.remove('hidden');
      } else {
        noCamMsg.textContent = 'Could not access the camera. Please check your device and try again.';
        openSettingsBtn.classList.add('hidden');
      }
    }
  }

  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    startCamera();
  });

  retryCamBtn.addEventListener('click', startCamera);

  // Deep-link to Android app settings; falls back gracefully on other platforms
  openSettingsBtn.addEventListener('click', () => {
    // Try Android intent first
    const intent = 'intent://settings#Intent;action=android.settings.APPLICATION_DETAILS_SETTINGS;end';
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    try {
      iframe.contentWindow.location.href = intent;
    } catch(e) {}
    setTimeout(() => document.body.removeChild(iframe), 500);
    // Also try the generic app-settings URI (iOS / some Android browsers)
    setTimeout(() => { window.location.href = 'app-settings:'; }, 50);
  });

  // ── Capture ───────────────────────────────────────────────
  shutterBtn.addEventListener('click', () => {
    if (!stream) return;
    flash.classList.remove('flash');
    void flash.offsetWidth;
    flash.classList.add('flash');

    const vw = video.videoWidth  || 1280;
    const vh = video.videoHeight || 720;
    canvas.width = vw; canvas.height = vh;
    const ctx = canvas.getContext('2d');
    if (facingMode === 'user') { ctx.translate(vw, 0); ctx.scale(-1, 1); }
    ctx.drawImage(video, 0, 0, vw, vh);

    canvas.toBlob(blob => {
      originalBlob = blob;
      currentBlob  = blob;
      bgRemoved    = false;
      setPreview(blob);
      showIdScreen();
    }, 'image/jpeg', 0.92);
  });

  // ── Preview helper ────────────────────────────────────────
  function setPreview(blob) {
    if (previewImg._url) URL.revokeObjectURL(previewImg._url);
    const url = URL.createObjectURL(blob);
    previewImg._url = url;
    previewImg.src  = url;
  }

  // ── Screen transitions ────────────────────────────────────
  function showIdScreen() {
    camScreen.classList.add('hidden');
    idScreen.classList.remove('hidden');
    partIdInput.value = '';
    filenamePreview.textContent = '—';
    saveBtn.disabled = true;
    resetBgUI();
    setTimeout(() => partIdInput.focus(), 300);
  }

  function showCamScreen() {
    idScreen.classList.add('hidden');
    camScreen.classList.remove('hidden');
    if (previewImg._url) URL.revokeObjectURL(previewImg._url);
    originalBlob = null;
    currentBlob  = null;
  }

  retakeBtn.addEventListener('click', showCamScreen);

  // ── Part ID / filename ────────────────────────────────────
  partIdInput.addEventListener('input', updateFilename);
  partIdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !saveBtn.disabled) saveBtn.click();
  });

  function updateFilename() {
    const raw = partIdInput.value.trim();
    saveBtn.disabled = raw.length === 0;
    if (raw) {
      const safe = raw.replace(/[^a-zA-Z0-9\-_.]/g, '_');
      filenamePreview.textContent = `${safe}.${bgRemoved ? 'png' : 'jpg'}`;
    } else {
      filenamePreview.textContent = '—';
    }
  }

  // ── Background Removal ────────────────────────────────────
  bgRemoveBtn.addEventListener('click', async () => {
    if (!originalBlob) return;
    bgRemoveBtn.disabled = true;
    bgRemoveBtn.textContent = '⏳ Processing…';
    bgProgress.classList.add('visible');
    bgProgressLabel.textContent = 'Loading model…';
    bgProgressFill.style.width  = '0%';

    try {
      const resultBlob = await removeBackground(originalBlob, {
        progress: (key, current, total) => {
          const pct = total > 0 ? Math.round((current / total) * 100) : 0;
          bgProgressFill.style.width  = pct + '%';
          bgProgressLabel.textContent = (key.includes('fetch') || key.includes('load'))
            ? `Loading model… ${pct}%`
            : `Removing background… ${pct}%`;
        }
      });

      currentBlob = resultBlob;
      bgRemoved   = true;
      setPreview(resultBlob);
      previewWrap.classList.add('transparent-bg');
      previewBadge.textContent = 'BG REMOVED';
      bgRemoveBtn.textContent  = '✓ Background Removed';
      bgRemoveBtn.classList.add('done');
      bgRemoveBtn.disabled = true;
      undoBtn.classList.add('visible');
      bgProgress.classList.remove('visible');
      updateFilename();
      showToast('Background removed ✓');
    } catch (err) {
      console.error(err);
      bgProgress.classList.remove('visible');
      bgRemoveBtn.disabled = false;
      bgRemoveBtn.textContent = '✂ Remove Background';
      showToast('Background removal failed', true);
    }
  });

  undoBtn.addEventListener('click', () => {
    currentBlob = originalBlob;
    bgRemoved   = false;
    setPreview(originalBlob);
    resetBgUI();
    updateFilename();
  });

  function resetBgUI() {
    previewWrap.classList.remove('transparent-bg');
    previewBadge.textContent = 'CAPTURED';
    bgRemoveBtn.textContent  = '✂ Remove Background';
    bgRemoveBtn.classList.remove('done');
    bgRemoveBtn.disabled = false;
    undoBtn.classList.remove('visible');
    bgProgress.classList.remove('visible');
  }

  // ── Save / Download ───────────────────────────────────────
  saveBtn.addEventListener('click', () => {
    if (!currentBlob || !partIdInput.value.trim()) return;
    const safe     = partIdInput.value.trim().replace(/[^a-zA-Z0-9\-_.]/g, '_');
    const filename = `${safe}.${bgRemoved ? 'png' : 'jpg'}`;

    const a = document.createElement('a');
    a.href = URL.createObjectURL(currentBlob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);

    showToast(`Saved ${filename}`);
    setTimeout(showCamScreen, 1800);
  });

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg, isError = false) {
    toastMsg.textContent = msg;
    toast.classList.toggle('error', isError);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2800);
  }

  // ── Install button click (prompt stored on window by early script) ─
installBtn.addEventListener('click', () => {
  if (!window.deferredPrompt) {
    console.log('No deferred prompt available');
    return;
  }
  const p = window.deferredPrompt;
  window.deferredPrompt = null;
  installBtn.classList.add('hidden');
  p.prompt();
  p.userChoice.then(choice => {
    console.log('Install outcome:', choice.outcome);
    if (choice.outcome !== 'accepted') {
      // User declined — show button again
      installBtn.classList.remove('hidden');
      window.deferredPrompt = p; // restore it
    }
  });
});

  // ── Service Worker ────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(console.error);
  }

  // ── Boot ──────────────────────────────────────────────────
  startCamera();
</script>
</body>
</html>
